<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - Acceso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card shadow-lg p-4" style="width: 25rem; border-radius: 15px;">
        <h3 class="text-center mb-4" id="form-title">Iniciar Sesión</h3>
        
        <div id="error-message" class="alert alert-danger d-none" role="alert"></div>

        <form id="auth-form">
            <div class="mb-3">
                <label for="username" class="form-label">Usuario</label>
                <input type="text" class="form-control" id="username" required placeholder="ej: pepito_dev">
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="password" required placeholder="********">
            </div>
            
            <button type="submit" class="btn btn-primary w-100 fw-bold" id="submit-btn">Ingresar</button>
        </form>

        <div class="text-center mt-3">
            <a href="#" id="toggle-form" class="text-decoration-none">¿No tienes cuenta? Regístrate aquí</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="app.js"></script>
</body>
</html>
