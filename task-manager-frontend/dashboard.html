<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; overflow-x: hidden; }
        .sidebar { height: 100vh; background-color: #212529; color: white; padding-top: 20px; }
        .task-card { cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; border-radius: 10px; }
        .task-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .completed-task { opacity: 0.7; }
        .completed-task h5 { text-decoration: line-through; color: #198754; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-3 col-lg-2 sidebar d-flex flex-column p-3 position-fixed">
            <h4 class="text-center mb-4 text-light">Task Manager</h4>
            
            <button class="btn btn-success w-100 mb-3 fw-bold" data-bs-toggle="modal" data-bs-target="#createModal">
                + Nueva Tarea
            </button>
            
            <div class="mt-auto">
                <button class="btn btn-secondary w-100" data-bs-toggle="modal" data-bs-target="#logoutModal">Cerrar Sesión</button>
            </div>
        </div>

        <div class="col-md-9 col-lg-10 offset-md-3 offset-lg-2 p-5">
            <h2 class="mb-4">Mis Tareas</h2>
            <div id="tasks-container" class="row g-4">
                </div>
        </div>
    </div>
</div>

<div class="modal fade" id="createModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title">Crear Nueva Tarea</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="text" id="new-title" class="form-control mb-3" placeholder="Título de la tarea">
                <input type="date" id="new-date" class="form-control mb-3">
                <textarea id="new-desc" class="form-control" placeholder="Descripción..." rows="3"></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn btn-success" onclick="createTask()">Guardar Tarea</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title">Detalle de la Tarea</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-id">
                <input type="text" id="edit-title" class="form-control mb-3 fw-bold">
                <textarea id="edit-desc" class="form-control mb-3" rows="4"></textarea>
                
                <div class="form-check form-switch fs-5">
                    <input class="form-check-input" type="checkbox" id="edit-completed">
                    <label class="form-check-label" for="edit-completed">Marcar como Completada</label>
                </div>
            </div>
            <div class="modal-footer d-flex justify-content-between">
                <button class="btn btn-danger" onclick="deleteTaskFromModal()">Eliminar</button>
                <button class="btn btn-primary" onclick="updateTask()">Guardar Cambios</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="logoutModal" tabindex="-1">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-warning text-white">
                <h5 class="modal-title">Cerrar Sesión</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center fw-bold mt-2">
                <p>¿Estás seguro que querés salir?</p>
            </div>
            <div class="modal-footer d-flex justify-content-center">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-warning" onclick="confirmLogout()">Salir</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="dashboard.js"></script>
</body>
</html>
