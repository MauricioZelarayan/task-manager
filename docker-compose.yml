version: '3.8'

services:
  db:
    image: postgres:16
    container_name: postgres-db
    environment:
      - TZ=UTC
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=task_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: